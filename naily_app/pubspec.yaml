name: liae_nails
description: "Nail Art App Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  image_picker: ^1.0.0
  shimmer: ^3.0.0
  url_launcher: ^6.2.5
  google_sign_in: ^6.2.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # 🔥 TAMBAHAN ICON
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/nails/
    - assets/icon.png   # 🔥 WAJIB ADA

# 🔥 CONFIG ICON APP
flutter_icons:
  android: true
  ios: true 
  image_path: "assets/icon.png"